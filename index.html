<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WeatherNow - Panel meteorológico educativo e inteligente desarrollado para bootcamp de JavaScript.">
  <title>WeatherNow - Dashboard de Clima Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="dashboard-container">
    <header>
      <h1>WeatherNow</h1>
      <p class="header-subtitle">Dashboard Meteorológico de Alta Precisión</p>
    </header>

    <section>
      <div class="section-title">
        <span>Buscar Pronóstico</span>
      </div>
      <form id="form-busqueda">
        <div class="input-wrapper">
          <input type="text" id="input-ciudad" placeholder="Ingresa el nombre de una ciudad (ej. Madrid, Bogotá)..." autocomplete="off" required>
        </div>
        <button type="submit" class="btn-buscar">Buscar</button>
      </form>
      <div id="resultado"></div>
    </section>

    <section>
      <div class="section-title">
        <span>Ciudades Favoritas</span>
        <button id="btn-refrescar" class="btn-accion">
          <span class="material-icons">refresh</span> Refrescar
        </button>
      </div>
      <div id="panel-ciudades"></div>
    </section>
  </div>

  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ciudades.js"></script>
</body>
</html>
